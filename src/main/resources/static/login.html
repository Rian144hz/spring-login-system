<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="container">
        <div class="form-box">
            <h2>Login</h2>
            <p>Bem-vindo de volta! Digite seus dados.</p>
            
            <form id="loginForm">
                <input type="email" id="email" placeholder="E-mail" required>
                <input type="password" id="senha" placeholder="Senha" required>
                
                <button type="submit">Entrar</button>
            </form>
            
            <p class="footer-text">Não tem uma conta? <a href="index.html">Cadastre-se</a></p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const dados = {
                email: document.querySelector('#email').value,
                senha: document.querySelector('#senha').value
            };

            try {
                const resposta = await fetch('http://localhost:8080/api/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await resposta.text();

                if (resultado === "Sucesso") {
                    alert("Login realizado com sucesso!");
                    window.location.href = "welcome.html"; 
                } else {
                    alert(resultado); // Vai mostrar "Erro: E-mail ou senha incorretos"
                }
            } catch (error) {
                console.error("Erro ao conectar:", error);
                alert("Servidor fora do ar!");
            }
        });
    </script>
</body>
</html>
